<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="練習用留白、順序與對比建立網頁重點，而不是把更多東西放進畫面。"><title>一個好看的頁面，不等於放進更多東西｜設計網頁之路</title><link rel="stylesheet" href="../styles.css?v=20260712-4"></head><body id="top"><header class="site-header"><a class="brand" href="../index.html">設計網頁之路</a><a class="back-link" href="../index.html#articles">← 所有文章</a></header><main><article class="article-page"><header class="article-hero"><div class="article-meta"><span>網頁設計</span><span>2026.07.08</span><span>閱讀 4 分鐘</span></div><h1>一個好看的頁面，不等於放進更多東西</h1><p>學著用留白、順序與對比建立重點，而不是讓每個區塊都搶著被注意。</p></header><div class="article-cover cover-type"><span>03</span><i>DESIGNING THE WEB</i></div><div class="article-body"><p>剛開始設計頁面時，很容易覺得空白代表還沒完成：再加一張圖片、再放一個標籤、再補一點顏色。但東西越多，閱讀方向反而越不清楚。</p><h2>先問這一頁最重要的是什麼</h2><p>如果使用者只能記得一件事，那會是什麼？這個問題幫助我決定標題大小、內容順序和按鈕的位置。</p><blockquote>留白不是沒有設計，而是讓設計能夠被看見。</blockquote><p>畫面安靜下來之後，內容反而更有力量。</p></div></article></main><footer><p>© 2026 設計網頁之路</p></footer></body></html>
