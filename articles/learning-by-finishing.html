<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="比起一直收藏教學，我選擇完成作品，從真正遇到的問題找出下一步。"><title>比起一直收藏教學，我更需要完成一個作品｜設計網頁之路</title><link rel="stylesheet" href="../styles.css?v=20260714-2"><link rel="canonical" href="https://jason133728-debug.github.io/design-web-journey/articles/learning-by-finishing.html"><meta property="og:type" content="article"><meta property="og:locale" content="zh_TW"><meta property="og:site_name" content="設計網頁之路"><meta property="og:title" content="比起一直收藏教學，我更需要完成一個作品｜設計網頁之路"><meta property="og:description" content="比起一直收藏教學，我選擇完成作品，從真正遇到的問題找出下一步。"><meta property="og:url" content="https://jason133728-debug.github.io/design-web-journey/articles/learning-by-finishing.html"><meta property="og:image" content="https://jason133728-debug.github.io/design-web-journey/assets/social-preview.svg"><meta property="og:image:type" content="image/svg+xml"><meta property="og:image:width" content="1200"><meta property="og:image:height" content="630"><meta name="twitter:card" content="summary_large_image"><script type="application/ld+json">{"@context":"https://schema.org","@type":"Article","headline":"比起一直收藏教學，我更需要完成一個作品","description":"比起一直收藏教學，我選擇完成作品，從真正遇到的問題找出下一步。","datePublished":"2026-06-10","dateModified":"2026-07-14","inLanguage":"zh-Hant","mainEntityOfPage":"https://jason133728-debug.github.io/design-web-journey/articles/learning-by-finishing.html","image":"https://jason133728-debug.github.io/design-web-journey/assets/social-preview.svg","author":{"@type":"Person","name":"設計網頁之路"},"publisher":{"@type":"Organization","name":"設計網頁之路"}}</script></head><body id="top"><header class="site-header"><a class="brand" href="../index.html">設計網頁之路</a><a class="back-link" href="../index.html#articles">← 所有文章</a></header><main><article class="article-page"><header class="article-hero"><div class="article-meta"><span>學習思考</span><span>2026.06.10</span><span>閱讀 2 分鐘</span></div><h1>比起一直收藏教學，我更需要完成一個作品</h1><p>知道和做到之間，隔著許多只有在真正完成作品時才會遇見的問題。</p></header><div class="article-cover cover-calendar"><span>07</span><i>DESIGNING THE WEB</i></div><div class="article-body"><p>收藏一篇好教學會帶來「我好像學會了」的感覺，但真正打開編輯器後，仍會遇到不知道從哪裡開始的空白。</p><h2>完成會暴露真正的問題</h2><p>只有做完整個頁面，才會發現字體載入、手機排版、內容長度和錯誤狀態彼此牽連。</p><blockquote>作品不必完美，但要完整到足以告訴你下一步該學什麼。</blockquote><p>所以我想用這個網站作為長期練習：每完成一版，就記下學到的事，再讓下一版比現在更清楚一點。</p></div></article></main><footer><p>© 2026 設計網頁之路</p></footer></body></html>
