<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="記錄我如何理解手機版與響應式設計，重新安排不同尺寸下的閱讀順序。"><title>手機版不是把桌面內容全部往下堆｜設計網頁之路</title><link rel="stylesheet" href="../styles.css?v=20260712-4"><link rel="canonical" href="https://jason133728-debug.github.io/design-web-journey/articles/responsive-design.html"><meta property="og:type" content="article"><meta property="og:locale" content="zh_TW"><meta property="og:site_name" content="設計網頁之路"><meta property="og:title" content="手機版不是把桌面內容全部往下堆｜設計網頁之路"><meta property="og:description" content="記錄我如何理解手機版與響應式設計，重新安排不同尺寸下的閱讀順序。"><meta property="og:url" content="https://jason133728-debug.github.io/design-web-journey/articles/responsive-design.html"><meta property="og:image" content="https://jason133728-debug.github.io/design-web-journey/assets/social-preview.svg"><meta property="og:image:type" content="image/svg+xml"><meta property="og:image:width" content="1200"><meta property="og:image:height" content="630"><meta name="twitter:card" content="summary_large_image"><script type="application/ld+json">{"@context":"https://schema.org","@type":"Article","headline":"手機版不是把桌面內容全部往下堆","description":"記錄我如何理解手機版與響應式設計，重新安排不同尺寸下的閱讀順序。","datePublished":"2026-07-02","dateModified":"2026-07-14","inLanguage":"zh-Hant","mainEntityOfPage":"https://jason133728-debug.github.io/design-web-journey/articles/responsive-design.html","image":"https://jason133728-debug.github.io/design-web-journey/assets/social-preview.svg","author":{"@type":"Person","name":"設計網頁之路"},"publisher":{"@type":"Organization","name":"設計網頁之路"}}</script></head><body id="top"><header class="site-header"><a class="brand" href="../index.html">設計網頁之路</a><a class="back-link" href="../index.html#articles">← 所有文章</a></header><main><article class="article-page"><header class="article-hero"><div class="article-meta"><span>網頁設計</span><span>2026.07.02</span><span>閱讀 2 分鐘</span></div><h1>手機版不是把桌面內容全部往下堆</h1><p>響應式設計真正要調整的，是不同尺寸下的閱讀順序與操作優先級。</p></header><div class="article-cover cover-dialogue"><span>04</span><i>DESIGNING THE WEB</i></div><div class="article-body"><p>第一次把桌面頁面縮到手機寬度時，我以為只要讓欄位變成單欄就夠了。結果雖然沒有跑版，卻變成一條很長、很難找到重點的內容。</p><h2>尺寸改變，任務也會改變</h2><p>手機上的時間更零碎，操作範圍也更小。導覽需要更直接、按鈕需要更好按，次要資訊則可以延後出現。</p><blockquote>響應式不是縮放畫面，而是重新安排注意力。</blockquote><p>現在每做一個區塊，我都會同時想像它在窄螢幕上的樣子。</p></div></article></main><footer><p>© 2026 設計網頁之路</p></footer></body></html>
