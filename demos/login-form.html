<!doctype html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>登入頁練習示範｜設計網頁之路</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="demo.css"></head>
<body><main><a class="back" href="../projects/login-form.html">← 返回作品紀錄</a><form id="login-demo"><span class="mark">HTML 表單練習</span><h1>歡迎回來！</h1><p>這是介面練習，不會連接帳號系統，也不會傳送或儲存輸入內容。</p><label for="demo-email">電子信箱</label><input id="demo-email" type="email" placeholder="name@example.com" autocomplete="off" required><label for="demo-password">密碼</label><input id="demo-password" type="password" placeholder="至少 8 個字元" minlength="8" autocomplete="off" required><button type="submit">試用登入按鈕</button><p class="help">請勿輸入真實帳號或密碼。</p><p class="message" aria-live="polite"></p></form></main><script>document.querySelector('#login-demo').addEventListener('submit',event=>{event.preventDefault();event.currentTarget.reset();event.currentTarget.querySelector('.message').textContent='介面測試完成！資料沒有送出。';});</script></body>
</html>
