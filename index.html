<body>
  <header class="site-header">
    <a class="brand" href="index.html">設計網頁之路 <small>學習與實作筆記</small></a>
    <button class="menu-button" aria-expanded="false" aria-controls="site-nav">選單</button>

  <main>
    <section class="intro-wrap">
      <p class="issue">從零開始 · 持續更新</p>
      <h1>把每一次嘗試，<br>變成下一頁的<em>起點。</em></h1>
      <p class="intro">這裡記錄我學習網頁設計的過程：做過的畫面、遇到的問題，以及那些只有親手完成一次才會真正明白的事。</p>
    </section>

    <section class="featured" id="featured" aria-labelledby="featured-title"></section>

    <section class="articles-section" id="articles">
      <div class="section-title"><h2>最新文章</h2><span id="article-count"></span></div>
      <div class="article-tools">
        <div class="filters" role="group" aria-label="文章分類">
          <button class="filter active" data-category="全部" aria-pressed="true">全部</button>
          <button class="filter" data-category="網頁設計" aria-pressed="false">網頁設計</button>
          <button class="filter" data-category="實作筆記" aria-pressed="false">實作筆記</button>
          <button class="filter" data-category="學習思考" aria-pressed="false">學習思考</button>
        </div>
        <label class="search"><span class="sr-only">搜尋文章</span><input id="search-input" type="search" placeholder="搜尋文章…" autocomplete="off"><span aria-hidden="true">⌕</span></label>
      </div>
      <div class="article-list" id="article-list"></div>
      <div class="empty-state" id="empty-state" hidden><p>沒有找到符合條件的文章。</p><button id="clear-search">清除搜尋</button></div>

      <div><p class="section-kicker">關於這裡</p><h2>一條邊做邊學的<br>網頁設計之路。</h2></div>
      <div class="about-copy"><p>我正在學習如何把想法變成真正能打開、能閱讀、也能使用的網頁。這不是專家的教科書，而是一份誠實的過程紀錄。姓名暫時留白，讓作品先替我說話。</p></div>
    </section>

    <section class="subscribe" id="subscribe">

      <form id="subscribe-form"><label for="email">電子信箱</label><div><input id="email" type="email" placeholder="you@example.com" required><button type="submit">訂閱筆記</button></div><p class="form-message" aria-live="polite"></p></form>
    </section>
